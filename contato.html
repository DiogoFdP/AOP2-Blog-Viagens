    <main>
        <h2 class="titulo-secao">Fale Conosco</h2>
        <p>Tem alguma dúvida ou quer compartilhar seu roteiro com a gente? Preencha o formulário abaixo!</p>

        <!-- Formulário de contato. Botei o ID aqui pro meu arquivo JS conseguir achar ele depois e validar -->
        <form id="form-contato" action="#" method="POST">
            
            <!-- Campo pro usuário colocar o nome -->
            <div>
                <!-- O 'for' liga o label ao input pra ficar acessível -->
                <label for="nome">Seu Nome:</label><br>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
            </div>
            
            <!-- Campo de E-mail (já vem com a validação do @ do HTML5) -->
            <div>
                <label for="email">Seu E-mail:</label><br>
                <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
            </div>
            
            <!-- Área de texto pra mensagem -->
            <div>
                <label for="mensagem">Sua Mensagem:</label><br>
                <textarea id="mensagem" name="mensagem" rows="5" placeholder="Escreva sua mensagem aqui..." required></textarea>
            </div>
            
            <!-- Botão de enviar que vai disparar meu script JS -->
            <button type="submit">Enviar Mensagem</button>

        </form>
    </main>

    <script src="script.js"></script>
